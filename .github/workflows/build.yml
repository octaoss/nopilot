name: Build Octanopilot Linux

on:
  push:
    branches: [ "main", "test/1.95" ]

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbfile-dev \
            pkg-config \
            libsecret-1-dev \
            libxss1 \
            dbus \
            xvfb \
            libgtk-3-0 \
            libgbm1 \
            fakeroot \
            libkrb5-dev \
            libasound2t64 \
            libnss3
          pip install setuptools

      - name: Install Node Dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_foreground_scripts: "true"
        run: npm ci

      - name: Download Built-in Extensions
        run: npm run download-builtin-extensions

      - name: Build Minified VS Code
        run: |
          # Build the core and extensions
          node ./node_modules/gulp/bin/gulp.js vscode-linux-x64-min

      - name: Prepare Artifact
        run: |
          VERSION=$(jq -r .version package.json)
          # The build task places output in ../VSCode-linux-x64 (outside the repo root)
          mv ../VSCode-linux-x64 ./octanopilot-linux-x64
          tar -czf "octanopilot-linux-x64-${VERSION}.tar.gz" octanopilot-linux-x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: octanopilot-linux-x64
          path: octanopilot-linux-x64-*.tar.gz
