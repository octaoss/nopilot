name: Build Binaries Release

on:
  push:
    branches: [ "main","fix/windows" ]

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbfile-dev \
            pkg-config \
            libsecret-1-dev \
            libxss1 \
            dbus \
            xvfb \
            libgtk-3-0 \
            libgbm1 \
            fakeroot \
            libkrb5-dev \
            libasound2t64 \
            libnss3 \
            rpm
          pip install setuptools

      - name: Install Node Dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_foreground_scripts: "true"
        run: npm ci

      - name: Download Built-in Extensions
        run: npm run download-builtin-extensions

      - name: Build
        run: |
          # Menggunakan vscode-linux-x64 (non-min) untuk kestabilan OSS
          node ./node_modules/gulp/bin/gulp.js vscode-linux-x64
          node ./node_modules/gulp/bin/gulp.js vscode-linux-x64-build-deb
          node ./node_modules/gulp/bin/gulp.js vscode-linux-x64-build-rpm

      - name: Prepare Artifact
        run: |
          VERSION=$(jq -r .version package.json)
          mkdir -p release-artifacts
          if [ -d "../VSCode-linux-x64" ]; then
            mv ../VSCode-linux-x64 ./octanopilot-linux-x64
            tar -czf "release-artifacts/octanopilot-linux-x64-${VERSION}.tar.gz" octanopilot-linux-x64
          fi
          find .build/linux/deb -name "*.deb" -exec cp {} release-artifacts/ \;
          find .build/linux/rpm -name "*.rpm" -exec cp {} release-artifacts/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifact
          path: release-artifacts/*

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_foreground_scripts: "true"
        run: |
          pip install setuptools
          npm ci

      - name: Download Built-in Extensions
        run: npm run download-builtin-extensions

      - name: Build
        run: |
          # Build portable version
          node ./node_modules/gulp/bin/gulp.js vscode-win32-x64-min
          # Build installers
          node ./node_modules/gulp/bin/gulp.js vscode-win32-x64-inno-updater
          node ./node_modules/gulp/bin/gulp.js vscode-win32-x64-user-setup
          node ./node_modules/gulp/bin/gulp.js vscode-win32-x64-system-setup

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          # Portable ZIP
          if (Test-Path ../VSCode-win32-x64) {
            Move-Item ../VSCode-win32-x64 ./octanopilot-win32-x64
            Compress-Archive -Path octanopilot-win32-x64 -DestinationPath "octanopilot-win32-x64-$version.zip"
          }
          # Installers
          if (Test-Path .build/win32-x64/user-setup/VSCodeSetup.exe) {
            Copy-Item .build/win32-x64/user-setup/VSCodeSetup.exe -Destination "octanopilot-user-setup-x64-$version.exe"
          }
          if (Test-Path .build/win32-x64/system-setup/VSCodeSetup.exe) {
            Copy-Item .build/win32-x64/system-setup/VSCodeSetup.exe -Destination "octanopilot-system-setup-x64-$version.exe"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifact
          path: |
            octanopilot-win32-x64-*.zip
            octanopilot-*-setup-x64-*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_foreground_scripts: "true"
        run: |
          pip install setuptools
          npm ci

      - name: Download Built-in Extensions
        run: npm run download-builtin-extensions

      - name: Build
        run: |
          node ./node_modules/gulp/bin/gulp.js vscode-darwin-x64

      - name: Prepare Artifact
        run: |
          VERSION=$(jq -r .version package.json)
          if [ -d "../VSCode-darwin-x64" ]; then
            mv ../VSCode-darwin-x64 ./octanopilot-darwin-x64
            zip -r "octanopilot-darwin-x64-${VERSION}.zip" octanopilot-darwin-x64
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifact
          path: octanopilot-darwin-x64-*.zip

  release:
    name: Create Draft Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nopilot ${{ steps.get_version.outputs.VERSION }}
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          draft: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
